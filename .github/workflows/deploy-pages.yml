name: Deploy To GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare static artifact
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p gh-pages-artifact

          if [[ -d "dist" ]]; then
            echo "Using build output: dist"
            cp -R dist/. gh-pages-artifact/
          elif [[ -d ".output/public" ]]; then
            echo "Using build output: .output/public"
            cp -R .output/public/. gh-pages-artifact/
          elif [[ -d ".vinxi/build/client" ]]; then
            echo "Using build output: .vinxi/build/client"
            cp -R .vinxi/build/client/. gh-pages-artifact/
          else
            echo "Could not find static build output directory."
            echo "Checked: dist, .output/public, .vinxi/build/client"
            ls -la
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages-artifact

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
