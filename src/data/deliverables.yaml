deliverableTypes:
  - code: PM
    name: Project Management Plan
    description: Schedule, organisation, risk register and reporting framework.
  - code: TN
    name: Technical Note
    description: Focused technical analyses and trade-off studies.
  - code: RB
    name: Requirements Baseline
    description: User, system and product requirements with traceability matrix.
  - code: ADD
    name: Architectural Design
    description: System decomposition, interfaces and deployment view.
  - code: DDD
    name: Detailed Design
    description: Component-level design, data models and processing chains.
  - code: ATBD
    name: Algorithm Theoretical Baseline
    description: Scientific basis and mathematical formulation of EO algorithms.
  - code: PVR
    name: Product Validation Report
    description: Validation methodology, reference datasets and quality metrics.
  - code: DPM
    name: Data Processing Manual
    description: Operational procedures for the cloud-based processing service.
  - code: FR
    name: Final Report
    description: Project outcomes, lessons learned and exploitation roadmap.

